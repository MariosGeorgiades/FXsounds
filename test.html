<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
</head>
<body>
  Initialising Test...
  <script>
    window.onload = async function() {
      console.log("Starting test upload...");
      const canvas = document.createElement('canvas');
      canvas.width = 10; canvas.height = 10;
      canvas.getContext('2d').fillRect(0,0,10,10);
      canvas.toBlob(async (blob) => {
        try {
          const { data, error } = await supabaseClient.storage.from('gallery').upload('test-image-' + Date.now() + '.jpg', blob, { contentType: 'image/jpeg' });
          if (error) {
            console.error("UPLOAD ERROR", error);
            document.body.innerHTML = "<h1>UPLOAD FAILED</h1><pre>" + JSON.stringify(error, null, 2) + "</pre>";
          } else {
            console.log("UPLOAD SUCCESS", data);
            document.body.innerHTML = "<h1>UPLOAD SUCCESS</h1><pre>" + JSON.stringify(data, null, 2) + "</pre>";
          }
        } catch (e) {
          console.error("CATCH ERROR", e);
          document.body.innerHTML = "<h1>EXCEPTION</h1><pre>" + e.message + "</pre>";
        }
      }, 'image/jpeg');
    }
  </script>
</body>
</html>
